version: "3.8"

services:
  # Init service to install custom apps
  app-installer:
    image: frappe/erpnext:v15
    command:
      - bash
      - -c
      - |
        echo "Installing HRMS app from Git..."
        bench get-app --branch develop hrms
        echo "HRMS app installation completed!"
    volumes:
      - apps:/home/frappe/frappe-bench/apps
    
  backend:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command: bash -c "cd /home/frappe/frappe-bench && bench use frontend && bench serve --port 8000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      - app-installer
      - db
      - redis-cache
      - redis-queue

  configurator:
    image: frappe/erpnext:v15
    restart: "no"
    entrypoint:
      - bash
      - -c
    # add redis_socketio for backward compatibility
    command:
      - >
        echo "Listing available apps...";
        ls -1 apps;
        ls -1 apps > sites/apps.txt;
        echo "Available apps: $(cat sites/apps.txt | tr '\n' ' ')";
        echo "Configuring database connection...";
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        echo "Configuring Redis connections...";
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        echo "Configuration completed successfully!";
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      - db

  create-site:
    image: frappe/erpnext:v15
    restart: "no"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        echo "Creating new site 'frontend' with ERPNext and HRMS...";
        bench new-site --no-mariadb-socket --admin-password=admin --db-root-password=admin --install-app erpnext --set-default frontend;
        echo "Installing HRMS app...";
        bench --site frontend install-app hrms;
        echo "Enabling server scripts...";
        bench --site frontend set-config -g server_script_enabled 1;
        echo "Site setup completed successfully with ERPNext and HRMS apps!"
    depends_on:
      - db
      - redis-cache
      - redis-queue
      - configurator

  db:
    image: mariadb:11.2
    healthcheck:
      test: mysqladmin ping -h localhost --password=admin
      interval: 1s
      retries: 15
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed # Temporary fix for MariaDB 10.6
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql

  frontend:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command: 
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 0.0.0.0
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "0.0.0.0:8080:8080"    
    depends_on:
      - backend

  queue-long:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps
    depends_on:
      - backend

  queue-short:
    image: frappe/erpnext:v15
    restart: unless-stopped
    depends_on: 
      - backend      
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  scheduler:
    image: frappe/erpnext:v15
    restart: unless-stopped
    depends_on: 
      - backend      
    command:
      - bench
      - schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  websocket:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "0.0.0.0:9000:9000"
    depends_on:
      - backend

volumes:
  db-data:
  redis-queue-data:
  redis-cache-data:
  sites:
  logs:
  apps: