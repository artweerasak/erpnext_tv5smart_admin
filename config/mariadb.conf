# MariaDB Configuration for ERPNext Production
# Place this file in /etc/mysql/mariadb.conf.d/99-erpnext.cnf

[mysqld]
# Basic Settings
user = mysql
pid-file = /var/run/mysqld/mysqld.pid
socket = /var/run/mysqld/mysqld.sock
port = 3306
basedir = /usr
datadir = /var/lib/mysql
tmpdir = /tmp
lc-messages-dir = /usr/share/mysql

# Character Set
character-set-server = utf8mb4
collation-server = utf8mb4_unicode_ci

# Performance Tuning
# Adjust based on your server RAM
innodb_buffer_pool_size = 1G          # 70-80% of RAM for dedicated DB server
innodb_log_file_size = 256M
innodb_log_buffer_size = 32M
innodb_flush_log_at_trx_commit = 2     # Better performance, slight risk
innodb_flush_method = O_DIRECT

# Connection Settings
max_connections = 200
thread_cache_size = 16
table_open_cache = 2048
table_definition_cache = 1024

# Query Cache (deprecated in newer versions)
query_cache_type = 0
query_cache_size = 0

# Temp Tables
tmp_table_size = 64M
max_heap_table_size = 64M

# MyISAM Settings (if needed)
key_buffer_size = 32M

# Logging
slow_query_log = 1
slow_query_log_file = /var/log/mysql/slow.log
long_query_time = 2

# Binary Log (for replication/backup)
log-bin = mysql-bin
binlog_format = ROW
expire_logs_days = 7
max_binlog_size = 100M

# Security
bind-address = 127.0.0.1

# ERPNext specific optimizations
innodb_file_format = Barracuda
innodb_file_per_table = 1
innodb_large_prefix = 1

# SSL (uncomment if using SSL)
# ssl-ca = /etc/mysql/ssl/ca-cert.pem
# ssl-cert = /etc/mysql/ssl/server-cert.pem
# ssl-key = /etc/mysql/ssl/server-key.pem

[mysql]
default-character-set = utf8mb4

[client]
default-character-set = utf8mb4
